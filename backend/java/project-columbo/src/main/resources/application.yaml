spring:
  application:
    name: project-columbo

  datasource:
    url: jdbc:postgresql://localhost:5432/columbo
    username: emmett
    password: secret

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  docker:
    compose:
      enabled: false

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: INFO

app:
  coingecko:
    api-key: ${COINGECKO_API_KEY:}
    base-url: "https://api.coingecko.com/api/v3"
  binance:
    base-url: "https://api.binance.com"
  market-pipeline:
    cron: "0 5 0 * * *" # Run at 00:05 UTC every day
  ingestion:
    backfill-start: "2025-11-11T00:00:00Z"

